<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Office</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script>
  // Auto-hide loading overlay after 2s
  setTimeout(function() {
    var lo = document.getElementById('loading-overlay');
    if (lo) { lo.style.transition = 'opacity 0.5s ease'; lo.style.opacity = '0';
      setTimeout(function() { lo.style.display = 'none'; }, 500); }
  }, 2000);
  if (typeof Phaser === 'undefined') {
    document.getElementById('loading-overlay').style.display = 'none';
    console.warn('Phaser CDN failed');
  }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; image-rendering: crisp-edges; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #f0f0f0;
    }

    /* ===== LOGIN ===== */
    #login-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; min-height: 100dvh; padding: 20px; width: 100%;
    }
    #login-screen.hidden { display: none; }
    .login-logo {
      font-size: 28px; color: #ffd700;
      text-shadow: 3px 3px 0 #e67e22, 0 0 20px rgba(255,215,0,0.3);
      margin-bottom: 8px; letter-spacing: 2px;
    }
    .login-subtitle {
      font-size: 12px; color: #00d4aa;
      margin-bottom: 30px; text-shadow: 0 0 10px rgba(0,212,170,0.3);
    }
    .login-box {
      background: rgba(22, 33, 62, 0.9);
      border: 2px solid rgba(255, 215, 0, 0.3);
      padding: 30px; width: 320px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,215,0,0.1);
    }
    .login-input {
      width: 100%; padding: 12px; margin: 10px 0;
      background: rgba(26, 26, 46, 0.8);
      border: 2px solid rgba(240, 240, 240, 0.2);
      color: #f0f0f0; font-family: 'Courier New', monospace; font-size: 14px;
      border-radius: 4px;
    }
    .login-input:focus { outline: none; border-color: #ffd700; box-shadow: 0 0 10px rgba(255,215,0,0.2); }
    .login-btn {
      width: 100%; padding: 14px; margin-top: 15px;
      background: linear-gradient(135deg, #0f9b0f, #1db81d);
      border: 2px solid rgba(255, 215, 0, 0.3);
      color: #f0f0f0; font-family: 'Courier New', monospace; font-size: 14px;
      cursor: pointer; font-weight: bold; border-radius: 4px;
    }
    .login-btn:hover { background: linear-gradient(135deg, #2ecc71, #3ddc84); }
    .login-error { color: #e74c3c; font-size: 12px; margin-top: 10px; min-height: 20px; text-align: center; }

    /* ===== APP ===== */
    #app { display: none; }
    #app.visible { display: flex; justify-content: center; align-items: center; min-height: 100vh; }

    #main-stage { position: relative; }

    #game-container {
      position: relative; border: 0;
      image-rendering: pixelated; width: 1280px; max-width: 100vw;
      aspect-ratio: 16/9; overflow: hidden;
    }
    #game-container canvas {
      width: 100% !important; height: 100% !important;
      image-rendering: pixelated; object-fit: contain;
      position: absolute; top: 0; left: 0; z-index: 10;
    }
    #game-skeleton {
      position: absolute; inset: 0; z-index: 5;
      background: radial-gradient(ellipse at center, #2a2a45 0%, #1a1a2e 65%, #151522 100%);
      display: flex; align-items: center; justify-content: center;
    }
    #game-skeleton .hint { color: #cbd5e1; font-size: 16px; }

    /* ===== LOADING OVERLAY ===== */
    #loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(ellipse at center, #1a1a2e, #0f0f23);
      display: flex; flex-direction: column; justify-content: center;
      align-items: center; z-index: 100000;
    }
    #loading-text { color: #ffd700; font-size: 16px; margin-bottom: 20px; }
    #loading-progress-container {
      width: 300px; height: 6px;
      background: rgba(51, 51, 51, 0.6);
      border: 1px solid rgba(255,215,0,0.2); border-radius: 3px; overflow: hidden;
    }
    #loading-progress-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #00d4aa, #ffd700);
      background-size: 200% 100%; border-radius: 3px;
    }

    /* ===== STATUS TEXT ===== */
    #status-text {
      position: absolute; bottom: 12px; left: 12px;
      color: rgba(238,238,238,0.35); font-size: 11px;
      z-index: 30; pointer-events: none;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>

  <!-- ===== LOADING ===== -->
  <div id="loading-overlay">
    <div id="loading-text">正在載入像素辦公室...</div>
    <div id="loading-progress-container">
      <div id="loading-progress-bar"></div>
    </div>
  </div>

  <!-- ===== LOGIN ===== -->
  <div id="login-screen">
    <div class="login-logo">PIXEL OFFICE</div>
    <div class="login-subtitle">AI Agent 管理系統</div>
    <div class="login-box">
      <input type="text" id="login-username" class="login-input" placeholder="使用者名稱" autocomplete="username">
      <input type="password" id="login-password" class="login-input" placeholder="密碼" autocomplete="current-password" onkeydown="if(event.key==='Enter')handleLogin()">
      <button class="login-btn" onclick="handleLogin()" id="login-btn">登入</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <!-- ===== APP ===== -->
  <div id="app">
    <div id="main-stage">
      <div id="game-container">
        <div id="game-skeleton"><div class="hint">正在進入像素辦公室…</div></div>
        <div id="status-text">載入中...</div>
      </div>
    </div>
  </div>

  <!-- ===== SCRIPTS ===== -->
  <script>
    // ===== AUTH =====
    const TOKEN_KEY='pixel_office_token';
    const USERNAME_KEY = 'username';

    async function handleLogin() {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value.trim();
      const errorEl = document.getElementById('login-error');
      if (!username || !password) { errorEl.textContent = '請輸入使用者名稱和密碼'; return; }
      errorEl.textContent = '登入中...';
      try {
        const resp = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await resp.json();
        if (!resp.ok) { errorEl.textContent = data.error || '登入失敗'; return; }
        localStorage.setItem(TOKEN_KEY, data.token);
        localStorage.setItem(USERNAME_KEY, username);
        enterOffice();
      } catch (e) { errorEl.textContent = '網路錯誤：' + e.message; }
    }

    function enterOffice() {
      document.getElementById('login-screen').classList.add('hidden');
      const app = document.getElementById('app');
      app.classList.add('visible');
      const script = document.createElement('script');
      script.src = '/game.js?_t=' + Date.now();
      document.body.appendChild(script);
    }

    function handleLogout() {
      localStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem(USERNAME_KEY);
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('app').classList.remove('visible');
      document.getElementById('login-error').textContent = '';
      if (window.hermesWs) { try { window.hermesWs.close(); } catch(e) {} window.hermesWs = null; }
    }

    function getToken() { return localStorage.getItem(TOKEN_KEY); }

    // ===== AUTO LOGIN =====
    (function autoLogin() {
      const token = localStorage.getItem(TOKEN_KEY);
      if (token) {
        fetch('/api/stats', { headers: { 'Authorization': 'Bearer ' + token }, cache: 'no-store' })
          .then(resp => { if (resp.ok) enterOffice(); else localStorage.removeItem(TOKEN_KEY); })
          .catch(() => enterOffice());
      }
    })();
  </script>
</body>
</html>
