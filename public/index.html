<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Office</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; image-rendering: crisp-edges; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      padding: 20px 0;
      gap: 10px;
      overflow-x: hidden;
      color: #f0f0f0;
    }

    /* ============ LOGIN SCREEN ============ */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      width: 100%;
    }
    #login-screen.hidden { display: none; }

    .login-logo {
      font-size: 28px;
      color: #ffd700;
      text-shadow: 3px 3px 0 #e67e22;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    .login-subtitle {
      font-size: 12px;
      color: #00d4aa;
      margin-bottom: 30px;
    }
    .login-box {
      background: #16213e;
      border: 4px solid #f0f0f0;
      padding: 30px;
      width: 320px;
      max-width: 100%;
      box-shadow: 8px 8px 0 #4a2c7a;
    }
    .login-input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      background: #1a1a2e;
      border: 3px solid #f0f0f0;
      color: #f0f0f0;
      font-family: 'Courier New', monospace;
      font-size: 14px;
    }
    .login-input:focus {
      outline: none;
      border-color: #ffd700;
      box-shadow: 4px 4px 0 #ffd700;
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      background: #0f9b0f;
      border: 4px solid #f0f0f0;
      color: #f0f0f0;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 4px 4px 0 #2d2d2d;
      transition: all 0.1s;
      font-weight: bold;
    }
    .login-btn:hover { background: #2ecc71; transform: translate(-2px, -2px); box-shadow: 6px 6px 0 #2d2d2d; }
    .login-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 #2d2d2d; }
    .login-error { color: #e74c3c; font-size: 12px; margin-top: 10px; min-height: 20px; text-align: center; }

    /* ============ MAIN APP ============ */
    #app { display: none; flex-direction: column; align-items: center; gap: 10px; width: 100%; }
    #app.visible { display: flex; }

    #main-stage {
      position: relative;
      width: 1280px;
      max-width: 95vw;
      transition: transform .25s ease;
    }
    body.sidebar-open #main-stage {
      transform: translateX(calc(-1 * max(0px, (min(320px, 92vw) + 20px) - ((100vw - 1280px) / 2))));
    }

    #game-container {
      position: relative;
      border: 0;
      image-rendering: pixelated;
      width: 1280px;
      height: 720px;
      max-width: 95vw;
      max-height: calc(95vw * 720 / 1280);
      overflow: hidden;
    }
    #game-container canvas {
      width: 100% !important;
      height: 100% !important;
      image-rendering: pixelated;
      object-fit: contain;
      box-shadow: inset 0 0 0 4px #64477d;
      position: relative;
      z-index: 10;
    }
    #game-skeleton {
      position: absolute;
      inset: 0;
      z-index: 5;
      background: radial-gradient(ellipse at center, #2a2a45 0%, #1a1a2e 65%, #151522 100%);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #game-skeleton .hint { color: #cbd5e1; font-size: 16px; }

    /* ============ LOADING OVERLAY ============ */
    #loading-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100000;
    }
    #loading-text { color: #ffd700; font-size: 16px; margin-bottom: 20px; }
    #loading-progress-container {
      width: 300px; height: 20px;
      background: #333;
      border: 2px solid #555;
    }
    #loading-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #e94560, #ffd700);
      width: 0%;
      transition: width 0.3s ease;
    }

    /* ============ STATUS TEXT ============ */
    #status-text {
      position: absolute;
      bottom: 12px; left: 12px;
      color: #eee;
      font-size: 14px;
      background: rgba(0,0,0,0.7);
      padding: 8px 12px;
      max-width: calc(100% - 24px);
      font-family: 'Courier New', monospace;
      z-index: 30;
      pointer-events: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ============ BOTTOM PANELS ============ */
    #bottom-panels {
      display: flex;
      gap: 10px;
      width: 1280px;
      max-width: 95vw;
      justify-content: flex-start;
      margin-top: 10px;
    }

    /* Memo panel */
    #memo-panel {
      position: relative;
      width: 460px;
      max-width: 100%;
      height: 200px;
      background: #111827;
      border: 4px solid #0e1119;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex: 1;
    }
    #memo-title {
      color: #ffd700;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 6px;
      text-align: center;
      letter-spacing: 1px;
    }
    #memo-date {
      color: #888;
      font-size: 10px;
      margin-bottom: 6px;
      text-align: right;
    }
    #memo-content {
      color: #cbd5e1;
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-y: auto;
      flex-grow: 1;
    }
    #memo-placeholder { color: #666; font-style: italic; text-align: center; padding: 20px 0; }

    /* Control bar */
    #control-bar {
      position: relative;
      background: #141722;
      padding: 10px;
      border: 4px solid #0e1119;
      width: 300px;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #control-bar-title {
      color: #ffd700;
      font-size: 14px;
      font-weight: bold;
      text-align: center;
      padding: 4px 0 8px;
    }
    #control-info {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .control-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 8px;
      background: #1f2937;
      font-size: 11px;
    }
    .control-label { color: #9ca3af; }
    .control-value { color: #f0f0f0; font-weight: bold; }

    .hermes-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: #1f2937;
      font-size: 11px;
      margin-top: 4px;
    }
    #hermes-indicator {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #e74c3c;
      flex-shrink: 0;
    }

    /* ============ SIDEBAR ============ */
    #sidebar-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000005;
      display: none;
    }
    #sidebar-backdrop.open { display: block; }

    #sidebar {
      position: fixed;
      top: 0;
      right: -100vw;
      width: 320px;
      max-width: 92vw;
      height: 100vh;
      background: #111827;
      border-left: 2px solid #22c55e;
      box-shadow: -8px 0 24px rgba(0,0,0,0.45);
      transition: right 0.25s ease;
      z-index: 1000010;
      display: flex;
      flex-direction: column;
    }
    #sidebar.open { right: 0; }

    #sidebar-header {
      color: #ecfdf5;
      font-size: 14px;
      padding: 12px;
      border-bottom: 1px solid rgba(148,163,184,0.22);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0b1220;
    }
    #sidebar-header button {
      cursor: pointer;
      border: 1px solid rgba(148,163,184,0.24);
      background: #1f2937;
      color: #fff;
      padding: 6px 10px;
      font-family: 'Courier New', monospace;
    }
    #sidebar-body {
      padding: 10px;
      overflow: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Department list */
    #department-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .dept-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1f2937;
      padding: 10px 12px;
      border: 1px solid #374151;
      cursor: pointer;
      transition: all 0.15s;
    }
    .dept-item:hover { border-color: #22c55e; background: #263548; }
    .dept-item.active { border-color: #22c55e; box-shadow: 0 0 0 1px rgba(34,197,94,0.4) inset; }
    .dept-icon { font-size: 18px; flex-shrink: 0; }
    .dept-name { flex: 1; font-size: 13px; color: #f0f0f0; }
    .dept-status {
      font-size: 10px;
      padding: 2px 6px;
      color: #2ecc71;
    }
    .dept-status.inactive { color: #e74c3c; }

    /* Department detail panel */
    #dept-detail-panel {
      display: none;
      background: #1f2937;
      border: 1px solid #374151;
      padding: 12px;
    }
    #dept-detail-content {
      font-size: 12px;
      line-height: 1.6;
    }
    .dept-detail-header {
      font-size: 16px;
      font-weight: bold;
      color: #ffd700;
      margin-bottom: 6px;
    }
    .dept-detail-meta {
      color: #9ca3af;
      font-size: 11px;
      margin-bottom: 12px;
    }
    .dept-detail-section-title {
      color: #00d4aa;
      font-size: 13px;
      font-weight: bold;
      margin: 10px 0 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid #374151;
    }
    .dept-detail-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      font-size: 11px;
    }
    .dept-detail-item:nth-child(odd) { background: rgba(0,0,0,0.1); }

    .dept-close-btn {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
      background: #e74c3c;
      border: none;
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      cursor: pointer;
    }
    .dept-close-btn:hover { background: #c0392b; }

    /* ============ TOP NAV ============ */
    #top-nav {
      width: 1280px;
      max-width: 95vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }
    #top-nav-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #top-nav-title {
      color: #ffd700;
      font-size: 14px;
      font-weight: bold;
      text-shadow: 2px 2px 0 #e67e22;
    }
    #top-nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .top-btn {
      padding: 6px 12px;
      background: #333;
      border: 2px solid #555;
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .top-btn:hover { border-color: #e94560; background: #444; }
    .top-btn.logout-btn { background: #5a1818; border-color: #e94560; }
    .top-btn.logout-btn:hover { background: #6a2828; }

    /* ============ COMPANY SELECTOR ============ */
    #company-select {
      padding: 4px 8px;
      background: #1a1a2e;
      border: 2px solid #ffd700;
      color: #ffd700;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      cursor: pointer;
    }
    #company-select:focus { outline: none; }
  </style>
</head>
<body>

  <!-- ===== LOADING OVERLAY ===== -->
  <div id="loading-overlay">
    <div id="loading-text">正在載入像素辦公室...</div>
    <div id="loading-progress-container">
      <div id="loading-progress-bar"></div>
    </div>
  </div>

  <!-- ===== LOGIN SCREEN ===== -->
  <div id="login-screen">
    <div class="login-logo">PIXEL OFFICE</div>
    <div class="login-subtitle">AI Agent 管理系統</div>
    <div class="login-box">
      <input type="text" id="login-username" class="login-input" placeholder="使用者名稱" autocomplete="username">
      <input type="password" id="login-password" class="login-input" placeholder="密碼" autocomplete="current-password">
      <button class="login-btn" onclick="handleLogin()">登入</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>

  <!-- ===== MAIN APP ===== -->
  <div id="app">
    <!-- Top Nav -->
    <div id="top-nav">
      <div id="top-nav-left">
        <span id="top-nav-title">Pixel Office</span>
      </div>
      <div id="top-nav-right">
        <select id="company-select">
          <option value="">所有公司</option>
          <option value="company-a">Company A</option>
          <option value="company-b">Company B</option>
        </select>
        <button class="top-btn" onclick="toggleSidebar()">☰ 部門</button>
        <button class="top-btn logout-btn" onclick="handleLogout()">登出</button>
      </div>
    </div>

    <!-- Main stage -->
    <div id="main-stage">
      <div id="game-container">
        <div id="game-skeleton"><div class="hint">正在進入像素辦公室…</div></div>
        <div id="status-text">載入中...</div>
      </div>

      <!-- Bottom panels -->
      <div id="bottom-panels">
        <!-- Memo -->
        <div id="memo-panel">
          <div id="memo-title">📝 即時訊息</div>
          <div id="memo-date"></div>
          <div id="memo-content"><div id="memo-placeholder">載入中...</div></div>
        </div>
        <!-- Control bar -->
        <div id="control-bar">
          <div id="control-bar-title">系統狀態</div>
          <div id="control-info">
            <div class="control-row">
              <span class="control-label">Agent 狀態</span>
              <span class="control-value" id="agent-status-display">待命中</span>
            </div>
            <div class="hermes-row">
              <span id="hermes-indicator"></span>
              <span id="hermes-text">Hermes 離線</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Sidebar backdrop -->
    <div id="sidebar-backdrop" onclick="closeSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar">
      <div id="sidebar-header">
        <span>📂 部門列表</span>
        <button onclick="closeSidebar()">關閉</button>
      </div>
      <div id="sidebar-body">
        <div id="department-list">
          <div style="color:#9ca3af;font-size:12px;text-align:center;padding:20px;">載入中...</div>
        </div>
        <div id="dept-detail-panel">
          <div id="dept-detail-content"></div>
          <button class="dept-close-btn" onclick="closeDepartmentView()">關閉檢視</button>
        </div>
      </div>
    </aside>
  </div>

  <!-- ===== SCRIPTS ===== -->
  <script src="/layout.js"></script>
  <script>
    // ============ AUTH ============
    const TOKEN_KEY = 'token';
    const USERNAME_KEY = 'username';

    async function handleLogin() {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value.trim();
      const errorEl = document.getElementById('login-error');

      if (!username || !password) {
        errorEl.textContent = '請輸入使用者名稱和密碼';
        return;
      }

      errorEl.textContent = '登入中...';

      try {
        const resp = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await resp.json();

        if (!resp.ok) {
          errorEl.textContent = data.error || '登入失敗';
          return;
        }

        localStorage.setItem(TOKEN_KEY, data.token);
        localStorage.setItem(USERNAME_KEY, username);
        enterOffice();
      } catch (e) {
        errorEl.textContent = '網路錯誤：' + e.message;
      }
    }

    function enterOffice() {
      document.getElementById('login-screen').classList.add('hidden');
      const app = document.getElementById('app');
      app.classList.add('visible');

      // Load game (defines connectHermes, initGame)
      const script = document.createElement('script');
      script.src = '/game.js?_t=' + Date.now();
      script.onload = function() {
        // game.js loaded - initGame will be called by game.js itself
      };
      document.body.appendChild(script);
    }

    function handleLogout() {
      localStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem(USERNAME_KEY);
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('app').classList.remove('visible');
      document.getElementById('login-error').textContent = '';

      // Disconnect WS
      if (window.hermesWs) {
        try { window.hermesWs.close(); } catch(e) {}
        window.hermesWs = null;
      }
    }

    function getToken() { return localStorage.getItem(TOKEN_KEY); }

    // ============ AUTO LOGIN CHECK ============
    (function autoLogin() {
      const token = localStorage.getItem(TOKEN_KEY);
      if (token) {
        // Validate token by calling a simple API
        fetch('/api/stats', {
          headers: { 'Authorization': 'Bearer ' + token },
          cache: 'no-store'
        })
        .then(resp => {
          if (resp.ok) {
            enterOffice();
          } else {
            localStorage.removeItem(TOKEN_KEY);
          }
        })
        .catch(() => {
          // Network error - still try to show office
          enterOffice();
        });
      }
    })();
  </script>
</body>
</html>
