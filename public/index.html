<!DOCTYPE html>

  <script>
  // Auto-hide loading overlay after 2s
  setTimeout(function() {
    var lo = document.getElementById('loading-overlay');
    if (lo) { lo.style.transition = 'opacity 0.5s ease'; lo.style.opacity = '0';
      setTimeout(function() { lo.style.display = 'none'; }, 500); }
  }, 2000);
  if (typeof Phaser === 'undefined') {
    document.getElementById('loading-overlay').style.display = 'none';
    console.warn('Phaser CDN failed');
  }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; image-rendering: crisp-edges; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #f0f0f0;

    /* ===== LOGIN ===== */
    #login-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;

    }

    .login-logo {
      font-size: 28px; color: #ffd700;
      text-shadow: 3px 3px 0 #e67e22, 0 0 20px rgba(255,215,0,0.3);
      margin-bottom: 8px; letter-spacing: 2px;

    .login-box {
      background: rgba(22, 33, 62, 0.9);
      border: 2px solid rgba(255, 215, 0, 0.3);
      padding: 30px; width: 320px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,215,0,0.1);
    }
    .login-input {
      width: 100%; padding: 12px; margin: 10px 0;
      background: rgba(26, 26, 46, 0.8);
      border: 2px solid rgba(240, 240, 240, 0.2);
      color: #f0f0f0; font-family: 'Courier New', monospace; font-size: 14px;

    }
    .login-input:focus { outline: none; border-color: #ffd700; box-shadow: 0 0 10px rgba(255,215,0,0.2); }
    .login-btn {
      width: 100%; padding: 14px; margin-top: 15px;
      background: linear-gradient(135deg, #0f9b0f, #1db81d);
      border: 2px solid rgba(255, 215, 0, 0.3);
      color: #f0f0f0; font-family: 'Courier New', monospace; font-size: 14px;

    .login-error { color: #e74c3c; font-size: 12px; margin-top: 10px; min-height: 20px; text-align: center; }

    #app { display: none; }
    #app.visible { display: flex; justify-content: center; align-items: center; min-height: calc(100vh - 40px); padding-top: 40px; }

    #main-stage { position: relative; }

      aspect-ratio: 16/9; overflow: hidden;

    }

      background: radial-gradient(ellipse at center, #1a1a2e, #0f0f23);

    #loading-text { color: #ffd700; font-size: 16px; margin-bottom: 20px; }

  </style>
</head>

<!-- ===== SCRIPTS ===== -->
  <script src="/pathfinding.js"></script>

  <script id="game-js-loader">
    // Fetch and eval game.js — set a flag when done
    window._gameReady = new Promise(function(resolve) {
      fetch('/game.js?_t=' + Date.now()).then(function(r) { return r.text(); }).then(function(code) {
        try {
          (0, eval)(code);
          console.log('✅ game.js eval success');
        } catch(e) { console.error('❌ game.js eval error:', e); }
        resolve();
      }).catch(function(e) {
        console.error('❌ game.js fetch error:', e);
        resolve(); // resolve anyway so app doesn't hang
      });
    });
  </script>
  <script>
    // ===== AUTH=***
const TOKEN_KEY='***';
    const USERNAME_KEY = 'username';

    async function handleLogin() {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value.trim();
      const errorEl = document.getElementById('login-error');
      if (!username || !password) { errorEl.textContent = '請輸入使用者名稱和密碼'; return; }
      errorEl.textContent = '登入中...';
      try {
        const resp = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await resp.json();
        if (!resp.ok) { errorEl.textContent = data.error || '登入失敗'; return; }
        localStorage.setItem(TOKEN_KEY, data.token);
        localStorage.setItem(USERNAME_KEY, username);
        enterOffice();
      } catch (e) { errorEl.textContent = '網路錯誤：' + e.message; }
    }

    function isMobile() {
      return window.innerWidth < 768;
    }

    function enterOffice() {
      document.getElementById('login-screen').classList.add('hidden');
      const app = document.getElementById('app');
      app.classList.add('visible');
      if (isMobile()) {
        console.log('📱 Mobile detected — skip game, show war room');
        openWarRoom();
        return;
      }
      // Wait for game.js to be fetched + evaled, then init
      var waitForGame = window._gameReady || Promise.resolve();
      waitForGame.then(function() {
        console.log('✅ Office entered, game ready');
        initGame();
      });
    }

    function handleLogout() {
      localStorage.removeItem(TOKEN_KEY);
      localStorage.removeItem(USERNAME_KEY);
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('app').classList.remove('visible');
      document.getElementById('login-error').textContent = '';
      if (window.hermesWs) { try { window.hermesWs.close(); } catch(e) {} window.hermesWs = null; }
    }

    function getToken() { return localStorage.getItem(TOKEN_KEY); }

    // ===== AUTO LOGIN =====
    (function autoLogin() {
      const token = localStorage.getItem(TOKEN_KEY);
      if (token) {
        fetch('/api/stats', { headers: { 'Authorization': 'Bearer ' + token }, cache: 'no-store' })
          .then(resp => { if (resp.ok) enterOffice(); else localStorage.removeItem(TOKEN_KEY); })
          .catch(() => enterOffice());
      }
    })();
  </script>



  <script>
    window.currentOffice = localStorage.getItem("current_office") || "company-a";

    // 載入已儲存的辦公室選擇
    const savedOffice = localStorage.getItem("current_office");
    if (savedOffice) {
      window.currentOffice = savedOffice;
      document.getElementById("office-switcher").value = savedOffice;
    }

    // 下拉選單切換
    document.getElementById("office-switcher").onchange = function() {
      window.currentOffice = this.value;
      localStorage.setItem("current_office", this.value);
      if (typeof setOfficeTheme === "function") setOfficeTheme(this.value);
      if (typeof fetchStatus === "function") {
        lastFetch = 0;
        fetchStatus();
        ttTarget = window.currentOffice === "company-a" ? "🖥️ 已切換到 MiniPC" : "💻 已切換到 MacBook";
        ttText = "";
        ttIdx = 0;
      }
    };
  </script>

    <!-- Stats -->
    <div class="wr-stats" id="wr-stats">
      <div class="wr-stat-card"><div class="val" id="ws-total">--</div><div class="lbl">Agent 總數</div></div>
      <div class="wr-stat-card"><div class="val" id="ws-commanders">--</div><div class="lbl">指揮官</div></div>
      <div class="wr-stat-card"><div class="val" id="ws-workers">--</div><div class="lbl">工作中</div></div>
      <div class="wr-stat-card"><div class="val" id="ws-idle">--</div><div class="lbl">閒置中</div></div>
      <div class="wr-stat-card"><div class="val" id="ws-tasks">--</div><div class="lbl">任務佇列</div></div>
    </div>

    <!-- Agent Grid -->
    <div class="wr-section">
      <div class="wr-section-title">👥 全員一覽</div>
      <div class="wr-agent-grid" id="wr-agent-grid"></div>
    </div>

    <!-- Org Tree -->
    <div class="wr-section">
      <div class="wr-section-title">🌳 Agent 組織圖</div>
      <div class="wr-org-tree" id="wr-org-tree">
        <div class="wr-tree-root" id="wr-tree-root" onclick="toggleOrgTree()">Hermes</div>
        <div class="wr-tree-children" id="wr-tree-children"></div>
      </div>
    </div>

    <!-- Task Queue -->
    <div class="wr-section">
      <div class="wr-section-title">📋 任務佇列</div>
      <div style="display:flex;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:4px">
        <button id="wr-create-task-btn" style="padding:4px 10px;border:1px solid #2ecc71;border-radius:4px;background:rgba(46,204,113,0.15);color:#2ecc71;cursor:pointer;font-family:monospace;font-size:11px;" onclick="openCreateTaskModal()">＋ 建立任務</button>
      </div>
      <div class="wr-task-filters" id="wr-task-filters">
        <button class="active" data-filter="all" onclick="filterTasks('all',this)">全部</button>
        <button data-filter="pending" onclick="filterTasks('pending',this)">待處理</button>
        <button data-filter="running" onclick="filterTasks('running',this)">進行中</button>
        <button data-filter="completed" onclick="filterTasks('completed',this)">已完成</button>
        <button data-filter="failed" onclick="filterTasks('failed',this)">失敗</button>
      </div>
      <div id="wr-tasks-container" style="overflow-x:auto">
        <table class="wr-task-table" id="wr-task-table">
          <thead><tr>
            <th>標題</th><th>指派</th><th>狀態</th><th>優先級</th><th>重試</th><th style="width:60px"></th>
          </tr></thead>
          <tbody id="wr-task-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>


<!-- Task logs modal -->
<div id="wr-task-logs-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:999999;align-items:center;justify-content:center;font-family:'Courier New',monospace;" onclick="if(event.target===this)this.style.display='none'">
  <div style="background:#1a1a2e;border:2px solid #ffd700;border-radius:6px;width:80vw;max-width:700px;max-height:70vh;padding:16px;overflow-y:auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <span style="color:#00d4aa;font-weight:bold;">&#x1F4DC; 任務日誌</span>
      <button onclick="document.getElementById('wr-task-logs-modal').style.display='none'" style="background:none;border:none;color:#ffd700;font-size:18px;cursor:pointer;">&#x2715;</button>
    </div>
    <pre id="wr-task-logs-content" style="color:#f0f0f0;font-size:11px;line-height:1.6;white-space:pre-wrap;word-break:break-all;margin:0;"></pre>
  </div>
</div>

<!-- Create task modal -->
<div id="wr-create-task-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:999999;align-items:center;justify-content:center;font-family:'Courier New',monospace;" onclick="if(event.target===this)closeCreateTaskModal()">
  <div style="background:#1a1a2e;border:2px solid #2ecc71;border-radius:6px;width:80vw;max-width:480px;padding:20px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <span style="color:#2ecc71;font-weight:bold;font-size:15px;">＋ 建立新任務</span>
      <button onclick="closeCreateTaskModal()" style="background:none;border:none;color:#ffd700;font-size:18px;cursor:pointer;">✕</button>
    </div>
    <label style="display:block;font-size:11px;color:#8899aa;margin-bottom:4px;">標題 *</label>
    <input id="ct-task-title" type="text" placeholder="輸入任務標題" style="width:100%;padding:8px;border:1px solid rgba(255,255,255,0.15);border-radius:4px;background:rgba(0,0,0,0.4);color:#f0f0f0;font-family:monospace;font-size:12px;box-sizing:border-box;margin-bottom:10px;">
    <label style="display:block;font-size:11px;color:#8899aa;margin-bottom:4px;">描述</label>
    <textarea id="ct-task-desc" placeholder="輸入任務描述（選填）" rows="3" style="width:100%;padding:8px;border:1px solid rgba(255,255,255,0.15);border-radius:4px;background:rgba(0,0,0,0.4);color:#f0f0f0;font-family:monospace;font-size:11px;box-sizing:border-box;resize:vertical;margin-bottom:10px;"></textarea>
    <label style="display:block;font-size:11px;color:#8899aa;margin-bottom:4px;">指派 Agent</label>
    <select id="ct-task-agent" style="width:100%;padding:8px;border:1px solid rgba(255,255,255,0.15);border-radius:4px;background:rgba(0,0,0,0.4);color:#f0f0f0;font-family:monospace;font-size:12px;box-sizing:border-box;margin-bottom:10px;">
      <option value="">不指定</option>
    </select>
    <label style="display:block;font-size:11px;color:#8899aa;margin-bottom:4px;">優先級</label>
    <select id="ct-task-priority" style="width:100%;padding:8px;border:1px solid rgba(255,255,255,0.15);border-radius:4px;background:rgba(0,0,0,0.4);color:#f0f0f0;font-family:monospace;font-size:12px;box-sizing:border-box;margin-bottom:16px;">
      <option value="normal">Normal</option>
      <option value="high">High</option>
      <option value="low">Low</option>
    </select>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button onclick="closeCreateTaskModal()" style="padding:6px 16px;border:1px solid rgba(255,255,255,0.15);border-radius:4px;background:rgba(255,255,255,0.06);color:#8899aa;cursor:pointer;font-family:monospace;font-size:11px;">取消</button>
      <button onclick="submitNewTask()" style="padding:6px 16px;border:1px solid #2ecc71;border-radius:4px;background:rgba(46,204,113,0.15);color:#2ecc71;cursor:pointer;font-family:monospace;font-size:11px;">提交</button>
    </div>
  </div>
</div>

<!-- ===== WAR ROOM JS ===== -->
<script>
let wrAgents = [];
let wrTasks = [];
let wrTaskFilter = 'all';

function escapeHtml(str) { if (!str) return ''; const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

    function openWarRoom() {
  document.getElementById('war-room-overlay').classList.add('active');
  loadWarRoom();
}
function closeWarRoom() {
  document.getElementById('war-room-overlay').classList.remove('active');
}
document.getElementById('war-close-btn').onclick = closeWarRoom;
document.getElementById('war-room-overlay').onclick = function(e) {
  if (e.target === this) closeWarRoom();
};

function switchWarOffice(officeId) {
  window.currentOffice = officeId;
  localStorage.setItem("current_office", officeId);
  document.querySelectorAll('.wr-office-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.office === officeId);
  });
  if (typeof setOfficeTheme === "function") setOfficeTheme(officeId);
  loadWarRoom();
}

function getWrToken() { return localStorage.getItem(TOKEN_KEY); }

function wrFetch(url, opts) {
  const token = getWrToken();
  return fetch(url, Object.assign({ headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }, cache: 'no-store' }, opts || {}));
}

async function loadWarRoom() {
  try {
    // Sync toggle button active state
    document.querySelectorAll('.wr-office-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.office === (window.currentOffice || 'company-a'));
    });
    const companyParam = (window.currentOffice && window.currentOffice !== 'company-a') ? '?company_id=' + window.currentOffice : '';
    const [agentsData, tasksData] = await Promise.all([
      wrFetch('/api/agents' + companyParam).then(r => r.ok ? r.json() : []),
      wrFetch('/api/agent-tasks' + companyParam).then(r => r.ok ? r.json() : [])
    ]);
    wrAgents = Array.isArray(agentsData) ? agentsData : (agentsData.agents || []);
    wrTasks = Array.isArray(tasksData) ? tasksData : (tasksData.tasks || []);
    renderStats();
    renderAgentGrid();
    renderOrgTree();
    renderTasks();
  } catch(e) { console.warn('War room load error:', e); }
}

function renderStats() {
  const total = wrAgents.length;
  const commanders = wrAgents.filter(a => (a.role||'').toLowerCase() === 'coordinator' || (a.role||'').includes('指揮')).length;
  const workers = wrAgents.filter(a => a.status === 'working' || a.status === 'busy').length;
  const idle = wrAgents.filter(a => a.status === 'idle' || a.status === 'active').length;
  const taskCount = wrTasks.length;
  document.getElementById('ws-total').textContent = total;
  document.getElementById('ws-commanders').textContent = commanders;
  document.getElementById('ws-workers').textContent = workers;
  document.getElementById('ws-idle').textContent = idle;
  document.getElementById('ws-tasks').textContent = taskCount;
}

function getStatusColor(status) {
  const s = (status||'').toLowerCase();
  if (s === 'active' || s === 'working') return '#2ecc71';
  if (s === 'busy' || s === 'running') return '#3498db';
  if (s === 'idle') return '#f1c40f';
  if (s === 'failed' || s === 'error') return '#e74c3c';
  return '#8899aa';
}

function renderAgentGrid() {
  const grid = document.getElementById('wr-agent-grid');
  if (!wrAgents.length) { grid.innerHTML = '<div style="color:#8899aa;font-size:11px;padding:10px">尚無 Agent 資料</div>'; return; }
  grid.innerHTML = wrAgents.map(a => {
    const name = a.name || a.username || a.id || 'Unknown';
    const role = a.role || 'worker';
    const status = a.status || 'idle';
    const color = getStatusColor(status);
    const caps = a.capabilities || [];
    const capsArr = Array.isArray(caps) ? caps : (typeof caps === 'string' ? caps.split(',') : []);
    return '<div class="wr-agent-card">' +
      '<div class="name">' + name + '</div>' +
      '<div><span class="role-tag">' + role + '</span></div>' +
      '<div class="status-line"><span class="wr-status-dot" style="background:'+color+'"></span>' +
        '<span style="color:'+color+'">' + (status) + '</span></div>' +
      '<div class="caps">' + capsArr.map(c => '<span>'+c.trim()+'</span>').join('') + '</div>' +
      '<select onchange="updateAgentStatus(\'' + (a.id||a._id) + '\', this.value)">' +
        '<option value="active" '+(status==='active'?'selected':'')+'>🟢 Active</option>' +
        '<option value="idle" '+(status==='idle'?'selected':'')+'>🟡 Idle</option>' +
        '<option value="busy" '+(status==='busy'?'selected':'')+'>🔵 Busy</option>' +
        '<option value="working" '+(status==='working'?'selected':'')+'>🟢 Working</option>' +
      '</select></div>';
  }).join('');
}

async function updateAgentStatus(agentId, newStatus) {
  if (!agentId) return;
  try {
    const r = await wrFetch('/api/agents/' + encodeURIComponent(agentId), {
      method: 'PATCH',
      body: JSON.stringify({ status: newStatus })
    });
    if (r.ok) loadWarRoom();
  } catch(e) { console.warn('Status update error:', e); }
}

function toggleOrgTree() {
  const root = document.getElementById('wr-tree-root');
  const children = document.getElementById('wr-tree-children');
  root.classList.toggle('collapsed');
  children.classList.toggle('collapsed');
}

function renderOrgTree() {
  const container = document.getElementById('wr-tree-children');
  if (!wrAgents.length) { container.innerHTML = '<div style="color:#8899aa;font-size:10px">尚無資料</div>'; return; }
  container.innerHTML = wrAgents.map(a => {
    const name = a.name || a.id || 'Agent';
    const role = a.role || 'worker';
    const status = a.status || 'idle';
    const color = getStatusColor(status);
    return '<div class="wr-tree-node">' +
      '<span class="wr-status-dot" style="background:'+color+'"></span>' +
      '<span style="font-weight:bold">' + name + '</span>' +
      '<span style="color:#00d4aa;font-size:9px">' + role + '</span>' +
      '<span style="color:'+color+';font-size:9px">[' + status + ']</span></div>';
  }).join('');
}

function filterTasks(filter, btn) {
  wrTaskFilter = filter;
  document.querySelectorAll('#wr-task-filters button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderTasks();
}

function renderTasks() {
  const tbody = document.getElementById('wr-task-body');
  let tasks = wrTasks;
  if (wrTaskFilter !== 'all') {
    tasks = tasks.filter(t => (t.status||'').toLowerCase() === wrTaskFilter);
  }
  if (!tasks.length) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#8899aa;padding:16px;font-size:11px">尚無任務</td></tr>';
    return;
  }
  tbody.innerHTML = tasks.map(t => {
    const id = t.id || t._id;
    const title = t.title || t.name || '(未命名)';
    const assignee = t.assignee || t.assigned_to || '-';
    const status = t.status || 'pending';
    const priority = t.priority || 'normal';
    const retries = t.retries || t.retry_count || 0;
    const statusClass = 'status-' + status;
    return '<tr>' +
      '<td data-label="標題" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + title + '</td>' +
      '<td data-label="指派">' + assignee + '</td>' +
      '<td class="' + statusClass + '" data-label="狀態">' + status + '</td>' +
      '<td data-label="優先級">' + priority + '</td>' +
      '<td data-label="重試">' + retries + '</td>' +
      '<td data-label="操作">' +
        (status === 'failed' ? '<button class="wr-task-btn" onclick="retryTask(\''+id+'\')">↻ 重試</button>' : '') +
        '<button class="wr-task-btn" onclick="deleteTask(\''+id+'\')">🗑 刪除</button>' +
        '<button class="wr-task-btn" onclick="viewTaskLogs(\''+id+'\')">📄 日誌</button>' +
      '</td></tr>';
  }).join('');
}

async function updateTask(taskId, newStatus) {
  if (!taskId) return;
  try {
    const r = await wrFetch('/api/agent-tasks/' + encodeURIComponent(taskId), {
      method: 'PATCH',
      body: JSON.stringify({ status: newStatus })
    });
    if (r.ok) loadWarRoom();
  } catch(e) { console.warn('Task update error:', e); }
}

async function deleteTask(taskId) {
  if (!taskId || !confirm('確定刪除這個任務？')) return;
  try {
    const r = await wrFetch('/api/agent-tasks/' + encodeURIComponent(taskId), { method: 'DELETE' });
    if (r.ok) loadWarRoom();
  } catch(e) { console.warn('Delete error:', e); }
}

async function retryTask(taskId) {
  if (!taskId) return;
  try {
    const r = await wrFetch('/api/agent-tasks/' + encodeURIComponent(taskId) + '/retry', { method: 'POST' });
    if (r.ok) loadWarRoom();
  } catch(e) { console.warn('Task retry error:', e); }
}

async function viewTaskLogs(taskId) {
  if (!taskId) return;
  try {
    const r = await wrFetch('/api/agent-tasks/' + encodeURIComponent(taskId) + '/logs');
    if (!r.ok) { alert('無法載入日誌'); return; }
    const logs = await r.json();
    const text = Array.isArray(logs) ? logs.map(l => (typeof l === 'object' ? JSON.stringify(l, null, 2) : l)).join('\n') : (typeof logs === 'object' ? JSON.stringify(logs, null, 2) : String(logs));
    document.getElementById('wr-task-logs-content').textContent = text || '(無日誌內容)';
    document.getElementById('wr-task-logs-modal').style.display = 'flex';
  } catch(e) { console.warn('Log fetch error:', e); }
}

function openCreateTaskModal() {
  // Populate agent dropdown
  const sel = document.getElementById('ct-task-agent');
  sel.innerHTML = '<option value="">不指定</option>';
  (wrAgents || []).forEach(a => {
    sel.innerHTML += '<option value="' + escapeHtml(a.id) + '">' + escapeHtml(a.name || a.id) + '</option>';
  });
  // Clear previous values
  document.getElementById('ct-task-title').value = '';
  document.getElementById('ct-task-desc').value = '';
  document.getElementById('ct-task-priority').value = 'normal';
  // Show modal
  document.getElementById('wr-create-task-modal').style.display = 'flex';
}

function closeCreateTaskModal() {
  document.getElementById('wr-create-task-modal').style.display = 'none';
}

async function submitNewTask() {
  const title = document.getElementById('ct-task-title').value.trim();
  if (!title) { alert('請輸入任務標題'); return; }
  const description = document.getElementById('ct-task-desc').value.trim() || null;
  const assigned_agent_id = document.getElementById('ct-task-agent').value || null;
  const priority = document.getElementById('ct-task-priority').value || 'normal';
  try {
    const r = await wrFetch('/api/agent-tasks', {
      method: 'POST',
      body: JSON.stringify({ title, description, assigned_agent_id, priority, company_id: (window.currentOffice || 'company-a') })
    });
    if (r.ok) {
      closeCreateTaskModal();
      loadWarRoom();
    } else {
      const data = await r.json();
      alert('建立失敗: ' + (data.error || r.statusText));
    }
  } catch(e) { alert('網路錯誤: ' + e.message); }
}
</script>

</body>
</html>
