services:
  - type: web
    name: pixel-office
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: dicoge
      - key: ADMIN_PASSWORD_HASH
        value: "$2a$12$8YKP.LqP2N7xvLZzKqKZBu7n0jGqN1kz8rBz3KqY6R5qEF6TaBUm"
      - key: ALLOWED_ORIGINS
        value: "*"
